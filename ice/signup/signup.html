<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            margin: auto;
            width: 400px;
            border: 10px solid #2a4a9c;
            border-radius: 15px;
            background: white;
        }

        .banner {
            position: relative;
            height: 170px;
            background-image: url(images/jesus_feeds_5000.jpeg);
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content:flex-end;
            align-items: center;
            color: white;
            text-shadow: 4px 4px 6px black;
            padding: 10px;
            border-radius: 4px;
        }

        .banner h1 {
            font-size: 3rem;
        }

        .banner h2 {
            font-size: 2rem;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
        }  

        .title {
            text-align: center;
            padding: 20px 0;
        }

        #myForm {
            padding: 0 25px 25px;
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
            align-items: center;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 165px;
        }

        section {
            grid-column: 1 / 3;
            text-align: center;
        }

        .footer {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: white;
        }

        .footer img {
            width: 100%;
            display: block;
        }

        .footer img:first-child {
            border-bottom-left-radius: 1px;
        }

        .footer img:last-child {
            border-bottom-right-radius: 1px;
        }
        
    </style>


</head>

<body>
    <div id="formContainer">
        <div class="banner">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <div class="title">
            <h3>Sign Up for Daily Scripture Feed</h3>
        </div>
        <form id="myForm">
            
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div class="footer">
            <img src="images/old_testament.webp" alt="Old Testament">
            <img src="images/new_testament.webp" alt="New Testament">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
