<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>Thomas S. Monson</td>
            <td>Examples of Righteousness</td>
            <td>General Conference</td>
            <td>2008</td>
          </tr>
          <tr>
            <td>H. David Burton</td>
            <td>And Who Is My Neighbor</td>
            <td>General Conference</td>
            <td>2008</td>
          </tr>
          <tr>
            <td>Henry B. Eyring</td>
            <td>Walk in the Light</td>
            <td>General Conference</td>
            <td>2008</td>
          </tr>
        </table>
        <form>
  
            <label for="speaker">Speaker</label>
            <input type="text" id="speaker" name="speaker">

            <label for="title">Title</label>
            <input type="text" id="title" name="title">

            <label for="location">Location</label>
            <input type="text" id="location" name="location">

            <label for="year">Year</label>
            <input type="number" id="year" name="year">

          <button type="submit">Submit</button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
