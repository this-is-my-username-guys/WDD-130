<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dry Oar Rafting</title>

    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <div id="content">

        <header>
            <img class="logo" src="images/logo.jpg" alt="logo">

            <nav>
                <a href="index.html">Home</a>
                <a href="#">Page 2</a>
                <a href="#">Site Plan</a>
                <a href="#">Contact Us</a>
            </nav>
        </header>

        <div id="hero">
            <img id="hero-img" src="images/hero.jpg" alt="rafting">

            <div id="hero-msg">
                <h1 class="home-title">Have An Adventure</h1>
                <h4>Make Memories with Dry Oar</h4>

                <div class="button-box">
                    <a class="book" href="#">Book Now</a>
                </div>
            </div>
        </div>

        <main>

            <section class="rivers-card">
                <img class="card-img" src="images/river.jpg" alt="river">
                <img class="icon" src="images/river_icon.jpg" alt="river icon">
                <h2>Rivers</h2>
            </section>

            <section class="camping-card">
                <img class="card-img" src="images/camping.jpg" alt="camping">
                <img class="icon" src="images/fire_icon.jpg" alt="fire icon">
                <h2>Camping</h2>
            </section>

            <section class="rapids-card">
                <img class="card-img" src="images/rapids.jpg" alt="rapids">
                <img class="icon" src="images/oars.jpg" alt="oars icon">
                <h2>Rapids</h2>
            </section>

            <div id="background"></div>

            <img class="mountains" src="images/mountains.jpg" alt="mountains">

            <section class="msg">
                <h2>More Than Just The Thrill</h2>

                <p>
                    Enjoy the breathtaking scenery and adventure.
                </p>

                <a class="join" href="#">Join Us</a>
            </section>

        </main>

        <footer>
            <p>Dry Oar © 2026</p>

            <p><a href="#">Site Plan</a></p>
            <p><a href="#">Contact Us</a></p>

            <div class="social">
                <a href="https://facebook.com" target="_blank">
                    <img src="images/facebook.jpg" alt="facebook">
                </a>

                <a href="https://twitter.com" target="_blank">
                    <img src="images/twitter.jpg" alt="twitter">
                </a>

                <a href="https://instagram.com" target="_blank">
                    <img src="images/instagram.jpg" alt="instagram">
                </a>
            </div>
        </footer>

    </div>
</body>

</html>
